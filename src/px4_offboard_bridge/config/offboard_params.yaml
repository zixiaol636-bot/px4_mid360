vision_pose_bridge:
  ros__parameters:
    odom_topic: /odom_filtered
    vision_pose_topic: /mavros/vision_pose/pose
    vision_pose_cov_topic: /mavros/vision_pose/pose_cov
    frame_id: map
    publish_rate: 30.0

offboard_controller:
  ros__parameters:
    auto_start: false
    setpoint_rate: 30.0
    takeoff_height: 2.0
    takeoff_speed: 0.5
    landing_speed: 0.3
    hover_duration: 0.0
    offboard_mode: OFFBOARD
    state_topic: /mavros/state
    local_position_topic: /mavros/local_position/pose
    setpoint_topic: /mavros/setpoint_velocity/cmd_vel
    arming_service: /mavros/cmd/arming
    set_mode_service: /mavros/set_mode

cmdvel_to_setpoint:
  ros__parameters:
    cmd_vel_topic: /cmd_vel_safe
    setpoint_topic: /mavros/setpoint_velocity/cmd_vel
    obstacle_z_topic: /obstacle/z_status
    publish_rate: 25.0
    acceleration_limit: 1.0
    max_vel_horizontal: 1.5
    max_vel_vertical: 0.5
    max_yaw_rate: 1.0
    cmd_vel_timeout: 0.5

local_3d_avoidance:
  ros__parameters:
    cmd_vel_in_topic: /cmd_vel
    cmd_vel_out_topic: /cmd_vel_safe
    pointcloud_topic: /cloud_registered
    odom_topic: /odom_filtered
    publish_rate: 20.0
    input_timeout: 0.5
    cloud_timeout: 0.5
    cloud_in_body_frame: false
    max_points_to_process: 4000
    forward_influence_distance: 4.0
    rear_influence_distance: 1.0
    side_influence_distance: 2.5
    vertical_influence_distance: 2.0
    safety_distance_xy: 1.2
    safety_distance_z: 0.8
    hard_stop_distance: 0.6
    repulsion_gain_xy: 1.4
    repulsion_gain_z: 1.1
    lateral_escape_gain: 0.8
    vertical_escape_gain: 0.6
    smoothing_alpha: 0.35
    max_output_xy: 1.5
    max_output_z: 0.6
    max_output_yaw_rate: 1.0

z_axis_monitor:
  ros__parameters:
    pointcloud_topic: /cloud_registered
    obstacle_z_topic: /obstacle/z_status
    check_range: [-2.0, 2.0]
    point_density_threshold: 15
    min_z_response: -0.3
    max_z_response: 0.3
    clear_timeout: 1.0
    publish_rate: 5.0
