px4_visual_odometry_bridge:
  ros__parameters:
    odom_topic: /odom_filtered
    px4_namespace: ""
    vehicle_visual_odometry_topic: /fmu/in/vehicle_visual_odometry
    publish_rate: 30.0
    position_variance: 0.03
    orientation_variance: 0.05
    velocity_variance: 0.08
    use_twist_velocity: false

px4_cmdvel_bridge:
  ros__parameters:
    cmd_vel_topic: /cmd_vel_safe
    odom_topic: /odom_filtered
    px4_namespace: ""
    offboard_control_mode_topic: /fmu/in/offboard_control_mode
    trajectory_setpoint_topic: /fmu/in/trajectory_setpoint
    vehicle_command_topic: /fmu/in/vehicle_command
    publish_rate: 25.0
    cmd_vel_timeout: 0.5
    max_vel_horizontal: 1.5
    max_vel_vertical: 0.5
    max_yaw_rate: 1.0
    auto_offboard: false
    auto_arm: false
    startup_setpoint_count: 10

px4_status_bridge:
  ros__parameters:
    px4_namespace: ""
    vehicle_status_topic: /fmu/out/vehicle_status
    vehicle_command_ack_topic: /fmu/out/vehicle_command_ack
    status_text_topic: /px4_native/status
    armed_topic: /px4_native/armed

ego_planner_path_follower:
  ros__parameters:
    planned_path_topic: /planning/local_path
    odom_topic: /odom_filtered
    cmd_vel_out_topic: /cmd_vel_planned
    path_timeout: 0.5
    lookahead_distance: 1.0
    position_gain: 0.8
    yaw_gain: 1.0
    max_xy_speed: 1.2
    max_z_speed: 0.5
    max_yaw_rate: 0.8
    publish_rate: 30.0

local_3d_safety_filter:
  ros__parameters:
    cmd_vel_in_topic: /cmd_vel_planned
    cmd_vel_out_topic: /cmd_vel_safe
    pointcloud_topic: /cloud_local_obstacles
    pointcloud_frame_mode: world
    odom_topic: /odom_filtered
    stop_status_topic: /safety/obstacle_stop
    cmd_timeout: 0.5
    cloud_timeout: 0.8
    danger_distance: 0.8
    caution_distance: 2.5
    corridor_radius_xy: 0.7
    corridor_radius_z: 0.6
    max_xy_speed: 1.2
    max_z_speed: 0.5
    publish_rate: 30.0
    stop_on_stale_cloud: true
