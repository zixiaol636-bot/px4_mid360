# Example waypoint set for warehouse inventory flight.
# Positions are in the map frame. Units: meters and seconds.
---
- frame_id: "map"
  position: [2.0, 1.0, 2.5]
  orientation: [0.0, 0.0, 0.0, 1.0]
  hover_time: 5.0
  acceptance_radius: 0.5

- frame_id: "map"
  position: [2.0, 10.0, 2.5]
  orientation: [0.0, 0.0, 0.707, 0.707]
  hover_time: 3.0
  acceptance_radius: 0.5

- frame_id: "map"
  position: [5.0, 10.0, 2.5]
  orientation: [0.0, 0.0, 0.0, 1.0]
  hover_time: 5.0
  acceptance_radius: 0.5

- frame_id: "map"
  position: [5.0, 1.0, 2.5]
  orientation: [0.0, 0.0, 0.707, 0.707]
  hover_time: 3.0
  acceptance_radius: 0.5

- frame_id: "map"
  position: [0.0, 0.0, 2.0]
  orientation: [0.0, 0.0, 0.0, 1.0]
  hover_time: 0.0
  acceptance_radius: 0.5
