# Nav2 主参数 — 无人机仓库导航
# ROS2 Humble — 行为树 + 全局规划器 + DWB 控制器
#
# 用法: ros2 launch nav2_bringup navigation_launch.py params_file:=nav2_params.yaml

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom_filtered
    default_bt_xml_filename: "navigate_w_replanning_and_recovery.xml"
    bt_loop_duration: 10
    default_server_timeout: 20
    enable_groot_monitoring: false

controller_server:
  ros__parameters:
    controller_plugins: ["FollowPath"]
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      # 无人机适配: 完整约束采样 (无差速底盘加速限制)
      use_dwa: false
      prune_plan: true
      prune_distance: 2.0
      transform_tolerance: 0.1

      # Velocity limits
      min_vel_x: 0.0
      max_vel_x: 1.5
      min_vel_y: -0.5
      max_vel_y: 0.5
      min_vel_theta: -1.0
      max_vel_theta: 1.0
      acc_lim_x: 1.0
      acc_lim_y: 0.5
      acc_lim_theta: 1.5

      # Trajectory simulation
      sim_time: 1.5
      sim_granularity: 0.025
      vx_samples: 10
      vy_samples: 5
      vth_samples: 10

      # Goal tolerance
      xy_goal_tolerance: 0.5
      yaw_goal_tolerance: 0.1
      latch_xy_goal_tolerance: false

      # 评分器 (顺序重要: 依次计算)
      critics:
        - "ObstacleFootprint"
        - "GoalAlign"
        - "PathAlign"
        - "GoalDist"
        - "Oscillation"

      ObstacleFootprint:
        scale: 10.0
        obstacle_inflation_scale: 1.0

      GoalAlign:
        scale: 5.0
        forward_point_distance: 0.5
        max_angle: 1.57

      PathAlign:
        scale: 3.0
        max_angle: 1.57

      GoalDist:
        scale: 2.0
        max_distance: 3.0

      Oscillation:
        scale: 1.0
        penalty_multiplier: 2.0

planner_server:
  ros__parameters:
    planner_plugins: ["GridBased"]
    use_sim_time: false
    expected_planner_frequency: 1.0

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: true
      allow_unknown: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: base_link
      update_frequency: 1.0
      publish_frequency: 0.5
      static_map: true
      rolling_window: false
      resolution: 0.1
      plugins: ["static_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.4
        cost_scaling_factor: 5.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: odom
      robot_base_frame: base_link
      update_frequency: 5.0
      publish_frequency: 2.0
      static_map: false
      rolling_window: true
      width: 20.0
      height: 20.0
      resolution: 0.1
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: mid360_scan

        mid360_scan:
          topic: /cloud_registered
          sensor_frame: lidar_frame
          data_type: PointCloud2
          marking: true
          clearing: true
          min_obstacle_height: -1.0
          max_obstacle_height: 2.0
          obstacle_max_range: 12.0
          raytrace_max_range: 15.0
          inf_is_valid: false
          voxel_filter: true
          voxel_min_points: 3
          clearing_radius: 12.0
          observation_persistence: 2.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.3
        cost_scaling_factor: 3.0

behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: /local_costmap/costmap
    footprint_topic: /local_costmap/published_footprint
    cycle_frequency: 10.0

    # Recovery behaviors
    rotate_recovery:
      plugin: "nav2_recoveries/RotateRecovery"
    clear_costmap_recovery:
      plugin: "nav2_recoveries/ClearCostmapRecovery"
    wait_recovery:
      plugin: "nav2_recoveries/WaitRecovery"

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    stop_on_failure: false
    loop_rate: 20
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200
